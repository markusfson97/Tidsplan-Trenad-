/* Info popup */
.info-pop{position:fixed;background:var(--bg2);border:1px solid var(--brd);border-radius:10px;padding:16px 18px;min-width:260px;max-width:340px;box-shadow:0 12px 40px rgba(0,0,0,.5);z-index:50;display:none}
.info-pop.open{display:block}
.info-pop .ip-title{font-size:15px;font-weight:700;margin-bottom:10px;display:flex;align-items:center;gap:8px}
.info-pop .ip-title .pdot{width:10px;height:10px;border-radius:50%;flex-shrink:0}
.info-pop .ip-row{display:flex;gap:8px;margin-bottom:6px;font-size:12px;line-height:1.5}
.info-pop .ip-label{color:var(--txM);min-width:70px;flex-shrink:0;font-weight:600;font-size:11px;text-transform:uppercase;letter-spacing:.04em}
.info-pop .ip-val{color:var(--tx);font-weight:500}
.info-pop .ip-close{position:absolute;top:10px;right:10px;background:transparent;border:none;color:var(--txM);font-size:16px;cursor:pointer;width:22px;height:22px;border-radius:4px;display:flex;align-items:center;justify-content:center}
.info-pop .ip-close:hover{background:var(--bgH);color:var(--tx)}

/* Add row */
.add-row{opacity:.5;cursor:pointer;border-bottom:none!important}.add-row:hover{opacity:1;background:var(--bgH)}

/* Project info popup */
.proj-info{position:fixed;background:var(--bg2);border:1px solid var(--brd);border-radius:10px;padding:0;width:300px;box-shadow:0 10px 30px rgba(0,0,0,.45);z-index:50;display:none;overflow:hidden}
.proj-info.open{display:block}
.proj-info .pi-hdr{padding:12px 14px;border-bottom:1px solid var(--brd);display:flex;align-items:center;gap:8px}
.proj-info .pi-dot{width:10px;height:10px;border-radius:50%;flex-shrink:0}
.proj-info .pi-title{font-size:13px;font-weight:700;flex:1}
.proj-info .pi-body{padding:10px 14px}
.proj-info .pi-row{display:flex;gap:6px;padding:3px 0;font-size:11px}
.proj-info .pi-lbl{color:var(--txM);min-width:70px;flex-shrink:0;font-weight:600}
.proj-info .pi-val{color:var(--tx);flex:1}
.proj-info .pi-notes{margin-top:6px;padding:8px 10px;background:var(--bg);border-radius:5px;font-size:11px;color:var(--txD);line-height:1.5}
.proj-info .pi-foot{padding:8px 14px;border-top:1px solid var(--brd);display:flex;gap:5px;justify-content:flex-end}

/* Context menu */
.ctx{position:fixed;background:var(--bg2);border:1px solid var(--brd);border-radius:8px;padding:4px;min-width:140px;box-shadow:0 8px 24px rgba(0,0,0,.4);z-index:50;display:none}
.ctx.open{display:block}
.ctx-item{display:flex;align-items:center;gap:8px;padding:7px 10px;border-radius:5px;cursor:pointer;font-size:12px;font-weight:500;transition:background .1s;color:var(--tx)}
.ctx-item:hover{background:var(--bgH)}
.ctx-item.red{color:#ff6b8a}
.ctx-item.red:hover{background:rgba(255,80,100,.1)}

.warn-bg{position:fixed;inset:0;background:rgba(0,0,0,.55);backdrop-filter:blur(3px);z-index:110;display:none;align-items:center;justify-content:center;padding:20px}

.warn-hdr .warn-ico{font-size:22px}
.warn-hdr h3{font-size:14px;font-weight:700;color:var(--acc)}
.warn-body{padding:14px 18px;font-size:12px;line-height:1.6;color:var(--txD)}
.warn-body .conflict{background:var(--bg);border:1px solid var(--brd);border-radius:6px;padding:8px 10px;margin:6px 0;font-size:11px;display:flex;align-items:center;gap:8px}
.warn-body .conflict .c-icon{font-size:14px;flex-shrink:0}
.warn-body .conflict .c-info{flex:1}
.warn-body .conflict .c-name{font-weight:600;color:var(--tx)}
.warn-body .conflict .c-dates{color:var(--txM);font-family:'JetBrains Mono',monospace;font-size:10px}
.warn-foot{padding:12px 18px;border-top:1px solid var(--brd);display:flex;justify-content:flex-end;gap:6px}

/* LOGIN */

function easter(y){const a=y%19,b=Math.floor(y/100),c=y%100,d=Math.floor(b/4),e=b%4,ff=Math.floor((b+8)/25),g=Math.floor((b-ff+1)/3),h=(19*a+b-d-g+15)%30,i=Math.floor(c/4),k=c%4,L=(32+2*e+2*i-h-k)%7,m=Math.floor((a+11*h+22*L)/451),mo=Math.floor((h+L-7*m+114)/31),da=((h+L-7*m+114)%31)+1;return new Date(y,mo-1,da)}
function aD(d,n){const r=new Date(d);r.setDate(r.getDate()+n);return r}
function msE(y){for(let d=19;d<=25;d++){const t=new Date(y,5,d);if(t.getDay()===5)return t}}
function asD(y){for(let d=31;d<=31;d++){const t=new Date(y,9,d);if(t.getDay()===6)return t}for(let d=1;d<=6;d++){const t=new Date(y,10,d);if(t.getDay()===6)return t}}
function getH(y){const e=easter(y);return{[F(new Date(y,0,1))]:'Nyårsdagen',[F(new Date(y,0,6))]:'Trettondedag jul',[F(aD(e,-2))]:'Långfredagen',[F(e)]:'Påskdagen',[F(aD(e,1))]:'Annandag påsk',[F(new Date(y,4,1))]:'Första maj',[F(aD(e,39))]:'Kristi himmelfärdsdag',[F(aD(e,49))]:'Pingstdagen',[F(new Date(y,5,6))]:'Nationaldag',[F(msE(y))]:'Midsommarafton',[F(aD(msE(y),1))]:'Midsommardagen',[F(asD(y))]:'Alla helgons dag',[F(new Date(y,11,24))]:'Julafton',[F(new Date(y,11,25))]:'Juldagen',[F(new Date(y,11,26))]:'Annandag jul',[F(new Date(y,11,31))]:'Nyårsafton'}}
function F(d){return`${d.getFullYear()}-${String(d.getMonth()+1).padStart(2,'0')}-${String(d.getDate()).padStart(2,'0')}`}
function PD(s){const[y,m,d]=s.split('-').map(Number);return new Date(y,m-1,d)}
function DIY(y){return((y%4===0&&y%100!==0)||y%400===0)?366:365}
function DOY(d){const utc1=Date.UTC(d.getFullYear(),0,1);const utc2=Date.UTC(d.getFullYear(),d.getMonth(),d.getDate());return Math.floor((utc2-utc1)/864e5)+1}
function uid(){return Date.now().toString(36)+Math.random().toString(36).slice(2,8)}
function E(s){if(s==null)return'';return String(s).replace(/[&<>"']/g,c=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c]))}
function ini(n){return n.split(' ').map(p=>p[0]).slice(0,2).join('').toUpperCase()}

function isoWeek(d){const t=new Date(d.getTime());t.setDate(t.getDate()+3-(t.getDay()+6)%7);const y1=new Date(t.getFullYear(),0,4);return 1+Math.round(((t-y1)/864e5-(3-(y1.getDay()+6)%7))/7);}
function buildTLH(tw){
const y=S.year,td=DIY(y),H=getH(y),ts=F(new Date());
const mf=['Januari','Februari','Mars','April','Maj','Juni','Juli','Augusti','September','Oktober','November','December'];
const ms=['Jan','Feb','Mar','Apr','Maj','Jun','Jul','Aug','Sep','Okt','Nov','Dec'];
// Build month cells - each month width = number of days in that month * dW
let mH='';
for(let m=0;m<12;m++){
  const daysInMonth=new Date(y,m+1,0).getDate();
  const w=daysInMonth*dW;
  const label=w>60?mf[m]+' '+y:w>30?ms[m]:'';
  mH+=`<div class="mc" style="width:${w}px">${label}</div>`;
}
// Build week cells by iterating day by day, grouping by ISO week
let wH='';
let curWk=-1,wkDays=0;
for(let d=0;d<td;d++){
  const dt=new Date(y,0,d+1);
  const wk=isoWeek(dt);
  if(wk!==curWk){
    if(curWk!==-1){const w=wkDays*dW;wH+=`<div class="wc" style="width:${w}px">${w>=20?'v'+curWk:''}</div>`;}
    curWk=wk;wkDays=1;
  }else{wkDays++;}
}
if(wkDays>0){const w=wkDays*dW;wH+=`<div class="wc" style="width:${w}px">${w>=20?'v'+curWk:''}</div>`;}
// Build day cells
let dH='';const dws=['S','M','T','O','T','F','L'];
for(let d=0;d<td;d++){
  const dt=new Date(y,0,d+1),ds=F(dt),dow=dt.getDay();
  let c='dc';
  if(ds===ts)c+=' tod';
  else if(H[ds]&&S.filters.showHolidays)c+=' hol';
  else if(dow===0||dow===6)c+=' we';
  const tt=H[ds]?`title="${H[ds]}"`:'';
  const showDow=dW>=22;const showNum=dW>=14;
  dH+=`<div class="${c}" style="width:${dW}px" ${tt}>${showDow?`<div class="dw">${dws[dow]}</div>`:''}${showNum?`<div class="dn">${dt.getDate()}</div>`:''}</div>`;
}
const mVis=S.filters.showMonths?'':'hidden';
const wVis=S.filters.showWeeks?'':'hidden';
return`<div class="gtl-hdr"><div class="mr ${mVis}">${mH}</div><div class="wr ${wVis}">${wH}</div><div class="drw">${dH}</div></div>`;
}
function buildOvl(){const y=S.year,td=DIY(y),H=getH(y),ts=F(new Date());let o='';for(let d=0;d<td;d++){const dt=new Date(y,0,d+1),ds=F(dt),dow=dt.getDay();const left=d*dW;if(ds===ts)o+=`<div class="to" style="left:${left}px;width:${dW}px"></div>`;else if(H[ds]&&S.filters.showHolidays)o+=`<div class="ho" style="left:${left}px;width:${dW}px"></div>`;else if(dow===0||dow===6)o+=`<div class="wo" style="left:${left}px;width:${dW}px"></div>`;}return o;}
function buildBar(it){const y=S.year,s=PD(it.start),e2=PD(it.end);if(s.getFullYear()>y||e2.getFullYear()<y)return'';const yS=new Date(y,0,1),yE=new Date(y,11,31);const vS=s<yS?yS:s,vE2=e2>yE?yE:e2;const sD=DOY(vS)-1,eD=DOY(vE2)-1;const left=sD*dW,width=(eD-sD+1)*dW;if(it.kind==='vacation')return`<div class="bar vac" style="left:${left}px;width:${width}px" data-id="${it.id}" data-k="vacation"><div class="bh l" data-s="left" data-id="${it.id}"></div><span class="bi">🌴</span><span class="bl">Ledighet</span><div class="bh r" data-s="right" data-id="${it.id}"></div></div>`;const ow=S.employees.find(x=>x.id===it.empId);const cust=S.customers.find(x=>x.id===it.custId);const bc=cust?.color||'#666';const cc=(it.crew||[]).length;const cb=cc>0?`<span class="bc">+${cc}</span>`:'';const tt=`${E(it.title)}\nKund: ${E(cust?.name||'-')}\nAdress: ${E(it.address||'-')}\nAnsvarig: ${E(ow?.name||'-')}\n${it.start} → ${it.end}`;return`<div class="bar" style="left:${left}px;width:${width}px;background:${bc}" data-id="${it.id}" data-k="project" title="${tt}"><div class="bh l" data-s="left" data-id="${it.id}"></div><span class="bl">${E(it.address||it.title)}</span>${cb}<div class="bh r" data-s="right" data-id="${it.id}"></div></div>`;}

function initBarResize(){document.querySelectorAll('.bh').forEach(h=>{h.addEventListener('mousedown',e=>{e.stopPropagation();e.preventDefault();
const side=h.dataset.s,id=h.dataset.id;
const it=S.items.find(i=>i.id===id);if(!it)return;
const bar=h.closest('.bar');const row=bar.closest('.inner');const rr=row.getBoundingClientRect();const tl=bar.closest('.gtl');
h.classList.add('act');bar._dragged=true;
const origStart=it.start,origEnd=it.end;
const onM=ev=>{
  const x=ev.clientX-rr.left;
  const di=Math.max(0,Math.min(DIY(S.year)-1,Math.floor(x/dW)));
  const nd=new Date(S.year,0,di+1);
  if(side==='left'){
    if(nd<=PD(it.end)){it.start=F(nd);}
  }else{
    if(nd>=PD(it.start)){it.end=F(nd);}
  }
  const yS=new Date(S.year,0,1),yE=new Date(S.year,11,31);
  const s=PD(it.start),e2=PD(it.end);
  const vS=s<yS?yS:s,vE2=e2>yE?yE:e2;
  const sD=DOY(vS)-1,eD=DOY(vE2)-1;
  bar.style.left=sD*dW+'px';
  bar.style.width=(eD-sD+1)*dW+'px';
};
const onU=()=>{
  document.removeEventListener('mousemove',onM);
  document.removeEventListener('mouseup',onU);
  h.classList.remove('act');
  save();
  // Save scroll positions before re-render
  const scrolls={};document.querySelectorAll('.gtl').forEach((tl,i)=>{scrolls[i]=tl.scrollLeft;});
  render();
  // Restore scroll positions
  document.querySelectorAll('.gtl').forEach((tl,i)=>{if(scrolls[i]!==undefined)tl.scrollLeft=scrolls[i];});
  setTimeout(()=>{const b2=document.querySelector(`.bar[data-id="${id}"]`);if(b2)b2._dragged=false;},150);
};
document.addEventListener('mousemove',onM);
document.addEventListener('mouseup',onU);
});});}
function initRowDrag(){document.querySelectorAll('.nr[draggable]').forEach(row=>{row.ondragstart=e=>{e.dataTransfer.setData('text/plain',row.dataset.eidx);row.classList.add('dragging');};row.ondragend=()=>{row.classList.remove('dragging');document.querySelectorAll('.nr').forEach(r=>r.classList.remove('dot','dob'));};row.ondragover=e=>{e.preventDefault();const rect=row.getBoundingClientRect();row.classList.remove('dot','dob');if(e.clientY<rect.top+rect.height/2)row.classList.add('dot');else row.classList.add('dob');};row.ondragleave=()=>row.classList.remove('dot','dob');row.ondrop=e=>{e.preventDefault();document.querySelectorAll('.nr').forEach(r=>r.classList.remove('dot','dob'));const from=parseInt(e.dataTransfer.getData('text/plain'));const rect=row.getBoundingClientRect();let to=parseInt(row.dataset.eidx);if(e.clientY>=rect.top+rect.height/2)to++;if(from<to)to--;if(!S.visibleEmps)S.visibleEmps=[];const moved=S.visibleEmps.splice(from,1)[0];S.visibleEmps.splice(to,0,moved);save();render();};});}
function initProjDrag(){document.querySelectorAll('.pnr[draggable]').forEach(row=>{row.ondragstart=e=>{e.dataTransfer.setData('text/plain',row.dataset.pidx);row.classList.add('dragging');};row.ondragend=()=>{row.classList.remove('dragging');document.querySelectorAll('.pnr').forEach(r=>r.classList.remove('dot','dob'));};row.ondragover=e=>{e.preventDefault();const rect=row.getBoundingClientRect();row.classList.remove('dot','dob');if(e.clientY<rect.top+rect.height/2)row.classList.add('dot');else row.classList.add('dob');};row.ondragleave=()=>row.classList.remove('dot','dob');row.ondrop=e=>{e.preventDefault();document.querySelectorAll('.pnr').forEach(r=>r.classList.remove('dot','dob'));const fromIdx=parseInt(e.dataTransfer.getData('text/plain'));const rect=row.getBoundingClientRect();let toIdx=parseInt(row.dataset.pidx);if(e.clientY>=rect.top+rect.height/2)toIdx++;if(fromIdx<toIdx)toIdx--;const projItems=S.items.filter(i=>i.kind==='project');const otherItems=S.items.filter(i=>i.kind!=='project');const moved=projItems.splice(fromIdx,1)[0];projItems.splice(toIdx,0,moved);S.items=[...otherItems,...projItems];save();render();};});}
function initColResize(){document.querySelectorAll('.gcol-resize').forEach(h=>{let dr=false,sx,sw;const tgt=h.dataset.tgt;h.onmousedown=e=>{dr=true;sx=e.clientX;sw=tgt==='p'?nW:pW;h.classList.add('act');e.preventDefault();};document.addEventListener('mousemove',e=>{if(!dr)return;const w=Math.max(120,Math.min(350,sw+(e.clientX-sx)));if(tgt==='p')nW=w;else pW=w;render();});document.addEventListener('mouseup',()=>{if(dr)dr=false;});});}

function renderCustList(){const c=document.getElementById('c-list');if(S.customers.length===0){c.innerHTML='<div style="padding:14px;color:var(--txM);font-size:13px;text-align:center">Inga kunder tillagda</div>';return;}c.innerHTML=S.customers.map(cu=>{const projCount=S.items.filter(it=>it.custId===cu.id).length;const sel=cCustEdit===cu.id?'border-color:var(--acc);background:rgba(255,161,22,.08)':'';return`<div class="cc" style="margin-bottom:5px;padding:8px 10px;${sel}"><div style="width:28px;height:28px;border-radius:5px;background:${cu.color||'var(--bg3)'};display:flex;align-items:center;justify-content:center;font-size:12px;font-weight:700;color:white;flex-shrink:0">${cu.name[0]}</div><div class="ci" style="flex:1;font-size:13px"><span style="font-weight:600">${E(cu.name)}</span></div><span style="font-size:10px;color:var(--txM);font-family:'JetBrains Mono',monospace">${projCount} proj</span><button class="cr" onclick="editCust('${cu.id}')" title="Redigera">\u270f\ufe0f</button><button class="cr del" onclick="delCust('${cu.id}')" title="Ta bort">\u2716</button></div>`;}).join('');}
function setET(c){document.querySelectorAll('[data-et]').forEach(x=>x.classList.remove('sel'));c.classList.add('sel');sT=c.dataset.et;}
function openEmp(id=null){cE=id;const emp=id?S.employees.find(e=>e.id===id):null;document.getElementById('emp-mt').textContent=emp?'Redigera person':'Personal';document.getElementById('e-name').value=emp?.name||'';sT=emp?.empType||'anstalld';document.querySelectorAll('[data-et]').forEach(c=>c.classList.toggle('sel',c.dataset.et===sT));document.getElementById('e-save-btn').textContent=emp?'Spara ändringar':'+ Lägg till person';renderEmpList();document.getElementById('mo-emp').classList.add('show');setTimeout(()=>document.getElementById('e-name').focus(),50);}
function renderEmpList(){const el=document.getElementById('e-list');if(S.employees.length===0){el.innerHTML='<div style="padding:14px;color:var(--txM);font-size:13px;text-align:center">Inga personer tillagda</div>';return;}el.innerHTML=S.employees.map(emp=>{const tag=emp.empType==='ue'?'<span style="font-size:8px;background:var(--acc);color:#0f1419;padding:1px 5px;border-radius:3px;font-weight:800;margin-left:4px">UE</span>':'';const sel=cE===emp.id?'border-color:var(--acc);background:rgba(255,161,22,.08)':'';return`<div class="cc" style="margin-bottom:5px;padding:8px 10px;${sel}"><div style="width:28px;height:28px;border-radius:5px;background:${emp.empType==='ue'?'#5a8cd9':'#4a5568'};display:flex;align-items:center;justify-content:center;font-size:10px;font-weight:700;color:white;flex-shrink:0;font-family:'JetBrains Mono',monospace">${ini(emp.name)}</div><div class="ci" style="flex:1;font-size:13px"><span style="font-weight:600">${E(emp.name)}</span>${tag}</div><button class="cr" onclick="openEmp('${emp.id}')" title="Redigera">\u270f\ufe0f</button><button class="cr del" onclick="event.stopPropagation();cE='${emp.id}';delEmp();" title="Ta bort">\u2716</button></div>`;}).join('');}
async function saveEmp(){const n=document.getElementById('e-name').value.trim();if(!n){toast('Namn krävs');return;}const d={name:n,empType:sT};if(cE){Object.assign(S.employees.find(e=>e.id===cE),d);}else{S.employees.push({id:uid(),...d});}await save();cE=null;document.getElementById('e-name').value='';document.getElementById('e-save-btn').textContent='+ Lägg till person';document.getElementById('emp-mt').textContent='Personal';renderEmpList();render();toast(cE?'Uppdaterad':'Tillagd');}
async function delEmp(){if(!cE||!confirm('Ta bort personen?'))return;S.employees=S.employees.filter(e=>e.id!==cE);S.items=S.items.filter(it=>it.empId!==cE);S.visibleEmps=S.visibleEmps.filter(id=>id!==cE);for(const it of S.items){if(it.crew)it.crew=it.crew.filter(id=>id!==cE);}cE=null;document.getElementById('e-name').value='';document.getElementById('e-save-btn').textContent='+ Lägg till person';document.getElementById('emp-mt').textContent='Personal';await save();renderEmpList();render();toast('Borttagen');}
function pES(sel,sid,ex=[]){const av=S.employees.filter(e=>!ex.includes(e.id));sel.innerHTML=av.map(e=>`<option value="${e.id}">${E(e.name)}${e.empType==='ue'?' [UE]':''}</option>`).join('');if(sid&&av.find(e=>e.id===sid))sel.value=sid;}
function rCL(){const c=document.getElementById('p-cl');c.innerHTML='';for(const cid of sCrew){const e=S.employees.find(x=>x.id===cid);if(!e)continue;const tag=e.empType==='ue'?'<span class="ue">UE</span>':'';const d=document.createElement('div');d.className='cc';d.innerHTML=`<div class="av" style="background:${e.empType==='ue'?'#5a8cd9':'#4a5568'}">${ini(e.name)}</div><div class="ci">${E(e.name)} ${tag}</div><span class="cb2">TEAM</span><button class="cr" data-c="${cid}">×</button>`;d.querySelector('.cr').onclick=()=>{sCrew=sCrew.filter(c2=>c2!==cid);rCL();uCS();};c.appendChild(d);}}
function uCS(){const s=document.getElementById('p-cs');const rId=document.getElementById('p-resp').value;const ex=[rId,...sCrew].filter(Boolean);const av=S.employees.filter(e=>!ex.includes(e.id));s.innerHTML='<option value="">Lägg till...</option>'+av.map(e=>`<option value="${e.id}">${E(e.name)}${e.empType==='ue'?' [UE]':''}</option>`).join('');}
function addCrew(){const s=document.getElementById('p-cs');if(!s.value)return;sCrew.push(s.value);rCL();uCS();}
function openProj(id=null,dE=null,dS=null){if(S.employees.length===0){toast('Lägg till person');return;}if(S.customers.length===0){toast('Lägg till en kund först');return;}cP=id;const it=id?S.items.find(i=>i.id===id):null;const cs=document.getElementById('p-cust');cs.innerHTML=S.customers.map(c=>`<option value="${c.id}">${E(c.name)}</option>`).join('');cs.value=it?.custId||S.customers[0].id;document.getElementById('p-contact').value=it?.contact||'';document.getElementById('p-addr').value=it?.address||'';pES(document.getElementById('p-resp'),it?.empId||dE||S.employees[0].id);document.getElementById('p-resp').onchange=()=>uCS();sCrew=it?[...(it.crew||[])]:[];rCL();uCS();document.getElementById('p-s').value=it?.start||dS||F(new Date());document.getElementById('p-e').value=it?.end||dS||F(new Date());document.getElementById('p-n').value=it?.notes||'';document.getElementById('p-mt').textContent=it?'Redigera projekt':'Nytt projekt';document.getElementById('p-del').style.display=it?'inline-flex':'none';document.getElementById('mo-proj').classList.add('show');setTimeout(()=>document.getElementById('p-addr').focus(),50);}
let pendingSave=null;
function datesOverlap(s1,e1,s2,e2){return PD(s1)<=PD(e2)&&PD(s2)<=PD(e1);}
function findConflicts(empIds,start,end,excludeId){
  const conflicts=[];
  for(const eid of empIds){
    const emp=S.employees.find(e=>e.id===eid);if(!emp)continue;
    for(const it of S.items){
      if(it.id===excludeId)continue;
      const isInvolved=it.empId===eid||(it.crew&&it.crew.includes(eid));
      if(!isInvolved)continue;
      if(!datesOverlap(start,end,it.start,it.end))continue;
      const label=it.kind==='vacation'?'🌴 Semester':(it.title||'Projekt');
      conflicts.push({emp:emp.name,label,start:it.start,end:it.end});
    }
  }
  return conflicts;
}
function showWarn(conflicts,onConfirm){
  let h=`<p style="margin-bottom:8px">Följande personer är redan inbokade under den valda perioden:</p>`;
  for(const c of conflicts){
    h+=`<div class="conflict"><span class="c-icon">👤</span><div class="c-info"><div class="c-name">${E(c.emp)}</div><div>${E(c.label)}</div><div class="c-dates">${c.start} → ${c.end}</div></div></div>`;
  }
  h+=`<p style="margin-top:10px">Vill du boka in ändå?</p>`;
  document.getElementById('warn-body').innerHTML=h;
  pendingSave=onConfirm;
  document.getElementById('warn-bg').classList.add('show');
}
function warnConfirm(){document.getElementById('warn-bg').classList.remove('show');if(pendingSave){pendingSave();pendingSave=null;}}
function warnCancel(){document.getElementById('warn-bg').classList.remove('show');pendingSave=null;}

async function saveProj(){const empId=document.getElementById('p-resp').value,custId=document.getElementById('p-cust').value,contact=document.getElementById('p-contact').value.trim(),address=document.getElementById('p-addr').value.trim(),start=document.getElementById('p-s').value,end=document.getElementById('p-e').value;if(!start||!end){toast('Datum krävs');return;}if(PD(end)<PD(start)){toast('Slut efter start');return;}const cust=S.customers.find(c=>c.id===custId);const title=(cust?cust.name:'Projekt')+(address?' — '+address:'');const allPeople=[empId,...sCrew];const conflicts=findConflicts(allPeople,start,end,cP);const doSave=async()=>{const d={kind:'project',custId,contact,address,title,empId,crew:[...sCrew],start,end,notes:document.getElementById('p-n').value.trim()};if(cP)Object.assign(S.items.find(i=>i.id===cP),d);else S.items.push({id:uid(),...d});await save();cm('mo-proj');render();toast(cP?'Uppdaterat':'Tillagt');};if(conflicts.length>0){showWarn(conflicts,doSave);}else{await doSave();}}
async function saveVac(){const empId=document.getElementById('v-emp').value,start=document.getElementById('v-s').value,end=document.getElementById('v-e').value;if(!start||!end){toast('Datum krävs');return;}if(PD(end)<PD(start)){toast('Slut efter start');return;}const conflicts=findConflicts([empId],start,end,cV);const doSave=async()=>{const d={kind:'vacation',empId,start,end,notes:document.getElementById('v-n').value.trim()};if(cV)Object.assign(S.items.find(i=>i.id===cV),d);else S.items.push({id:uid(),...d});await save();cm('mo-vac');render();toast(cV?'Uppdaterad':'Tillagd');};if(conflicts.length>0){showWarn(conflicts,doSave);}else{await doSave();}}

function rCP(cId,sel,onSel,used=[]){const c=document.getElementById(cId);c.innerHTML='';for(const color of PAL){const sw=document.createElement('div');const u=used.includes(color);sw.className='cs2'+(color===sel?' sel':'')+(u&&color!==sel?' tk':'');sw.style.background=color;sw.onclick=()=>{onSel(color);c.querySelectorAll('.cs2').forEach(s=>s.classList.remove('sel'));sw.classList.add('sel');sw.classList.remove('tk');};c.appendChild(sw);}}

const pop=document.getElementById('proj-info');pop.innerHTML=h;

// ===== LOGIN SYSTEM =====
async function doLogin(){
  const email=document.getElementById('login-email').value.trim().toLowerCase();
  if(!email||!email.includes('@')){document.getElementById('login-err').textContent='Ange en giltig e-postadress';return;}
  document.getElementById('login-err').textContent='';
  currentUser=email;
  SK='plan-'+email.replace(/[^a-z0-9]/g,'-');
  // Save session
  try{await window.storage.set('plan-session',email);}catch(e){}
  await startApp();
}
async function doLogout(){
  try{await window.storage.set('plan-session','');}catch(e){}
  currentUser='';SK='';
  document.getElementById('main-wrap').classList.remove('show');
  document.getElementById('login-bg').style.display='flex';
  document.getElementById('login-email').value='';
  // Reset state
  S={employees:[],customers:[],items:[],filters:{showProjects:true,showVacations:true,showHolidays:true,showAnst:true,showUE:true,showWeeks:true,showMonths:true},year:new Date().getFullYear(),theme:'dark',collapsed:{personal:false,projekt:false}};
}
async function startApp(){
  document.getElementById('login-bg').style.display='none';
  document.getElementById('main-wrap').classList.add('show');
  document.getElementById('user-email').textContent=currentUser;
  await load();render();scr();
}

// Check for existing session on load
(async function(){
  try{
    const sess=await window.storage.get('plan-session');
    if(sess&&sess.value&&sess.value.includes('@')){
      currentUser=sess.value;
      SK='plan-'+currentUser.replace(/[^a-z0-9]/g,'-');
      await startApp();
    }
  }catch(e){}
  // Enter key on login input
  document.getElementById('login-email').addEventListener('keydown',e=>{if(e.key==='Enter')doLogin();});
})();
